name: "Founders and Coders C.I.C."
description: |
  A small nonprofit training provider with a peer-led training model,
  focused on software developer and machine learning apprenticeships.
  Programmes are free to learners. Incorporated as a Community Interest
  Company in 2015, running training programmes since 2014.
mission: |
  Inclusion, community, and helping people build careers in tech.
  Strong commitment to demographic diversity and engagement from
  programme alumni. Open source curriculum used internationally.
location: "Finsbury Park, London (Level 4); City Road, London (ML programmes)"
founded: 2014
legal_form: "Community Interest Company (CIC)"
website: "https://www.foundersandcoders.com"
key_facts:
  - "Programmes are free to learners, sustained by volunteer effort"
  - "Strong partnerships with employers including global brands, consultancies, and startups"
  - "Work closely with Islington Council and local stakeholders"
  - "International programmes with British Embassy (Israel), DCMS (South Africa), Mercy Corps (Gaza and West Bank)"
  - "Open source curriculum used by other training organisations worldwide"
  - "TechSkills Tech Industry Gold Accreditation"
